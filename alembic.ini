# Alembic configuration for database migrations.

[alembic]
# Path to migration scripts
script_location = infrastructure/database/migrations

# Template for migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Pre-commit hook for migrations (optional)
# prepend_sys_path = .

# Database URL (can be overridden via env)
sqlalchemy.url = sqlite+aiosqlite:///./data/bot.db

# Timezone for migration timestamps
timezone = UTC

# Truncate revision hashes
truncate_slug_length = 40

# Set to true to run migrations in transaction
transaction_per_migration = true

# Character set for migrations
# charset = utf8mb4

[post_write_hooks]
# Run Ruff format on new migration files
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = venv/bin/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
