repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pylint
        name: Run pylint
        entry: bash -c './.venv/bin/pylint --rcfile=.pylintrc $(git ls-files "*.py")'
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      # Pyright for static type checking and import validation
      - id: pyright
        name: Run pyright
        entry: bash -c './.venv/bin/pyright'
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: pytest
        name: Run pytest tests
        entry: bash -c './.venv/bin/python -m pytest tests/ -v --tb=short'
        language: system
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: bot-import-check
        name: Bot import check
        entry: bash -c './.venv/bin/python3 -c "from bot import main; import shared.i18n; import shared.utils; import interfaces.telegram.handlers"'
        language: system
        files: \.py$
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: bump-version
        name: Bump patch version
        entry: .githooks/bump-version.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: alembic-migrations-check
        name: Check Alembic migrations (upgrade/downgrade)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && ./.venv/bin/python -m alembic upgrade head && ./.venv/bin/python -m alembic downgrade base && ./.venv/bin/python -m alembic upgrade head'
        language: system
        pass_filenames: false
        stages: [manual]
