repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pycqa/pylint
    rev: v3.3.4
    hooks:
      - id: pylint
        args: [--rcfile=.pylintrc]

  # Pyright for static type checking and import validation
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.396
    hooks:
      - id: pyright

  - repo: local
    hooks:
      - id: bot-import-check
        name: Bot import check
        entry: bash -c './.venv/bin/python3 -c "from bot import main; import shared.i18n; import shared.utils; import interfaces.telegram.handlers"'
        language: system
        files: \.py$
        pass_filenames: false
        stages: [pre-commit, manual]

      - id: bump-version
        name: Bump patch version
        entry: .githooks/bump-version.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
